<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Account beantragen</h2>
    <p class="text-gray-500 mb-6 text-sm">Trage deine Studenten-Mail ein um Zugang zu beantragen.</p>

    <input
      [(ngModel)]="email"
      type="email"
      placeholder="vorname.nachname@stud.uni.de"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <button
      (click)="submit()"
      [disabled]="loading"
      class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50"
    >
      {{ loading ? 'Wird gesendet...' : 'Zugang beantragen' }}
    </button>

    <p *ngIf="success" class="text-green-600 text-sm mt-4 text-center">
      ✅ Anfrage gesendet! Du wirst benachrichtigt sobald dein Account freigeschaltet wird.
    </p>
    <p *ngIf="error" class="text-red-500 text-sm mt-4 text-center">
      {{ error }}
    </p>
  </div>
</div>
